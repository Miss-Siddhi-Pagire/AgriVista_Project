name: agrivista_mobile
description: AgriVista - Smart Farming Intelligence Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  go_router: ^13.2.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  lottie: ^3.1.0
  # ── Real HTTP client ──
  http: ^1.2.1
  # ── Multipart file upload support (image upload) ──
  mime: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
